}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;

.container{

/* FOTO PERFIL */

.perfil{
    text-align:center;
}

.perfil img{

    border-radius:50%;
    object-fit:cover;
    border:4px solid #ff4fd8;
    box-shadow:0 0 25px #ff4fd8;
}

/* NOME */

.nome-perfil{
    margin-top:15px;
    margin-bottom:25px;
    text-align:center;
    font-size:32px;
    font-weight:900;
    letter-spacing:2px;
    color:#FFFF00;
    text-shadow:

        0 0 10px #ff7b00,
        0 0 20px #ff4500,
        0 0 30px #ff4500;
}

/* BOTÃO */

.link-principal{
    display:block;
    text-decoration:none;
    color:#fff;
    background:linear-gradient(45deg,#ff4fd8,#7d4dff);
    padding:15px;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
    margin-bottom:25px;
    transition:.3s;
}

.link-principal:hover{
    transform:scale(1.05);
}

/* VÍDEO ESTILIZADO */

.video-box{
    width:100%;
    margin:25px 0;
    padding:6px;

    background:linear-gradient(
        45deg,
        #ff4fd8,
        #7d4dff
    );

        0 0 15px #ff4fd8,
        0 0 30px #7d4dff;
}

.video-box video{
    width:100%;
    border-radius:15px;
    display:block;
}

/* REDES SOCIAIS */

.redes{

    align-items:center;
    gap:20px;
}

.box-icone{

    flex-direction:row;
    align-items:center;
    gap:12px;
}

.box-icone img{
    width:60px;
    height:60px;
    object-fit:contain;
    border-radius:50%;
    transition:.3s;

}

.box-icone img:hover{
    transform:scale(1.1);
}

.box-icone span{

/* FRASE */
